name: release

on:
    push:
        tags:
            - "v*"

permissions:
    actions: read
    contents: write

jobs:
    verify-development-ci:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 24
                  package-manager-cache: false
            - name: 验证同一提交的开发 CI
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: node ./scripts/verify-release-ci.mjs

    build-worker:
        needs: verify-development-ci
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: ubuntu-24.04
                      target: linux-x64
                      rust_target: x86_64-unknown-linux-musl
                      zig_arch: x86_64
                    - runner: ubuntu-24.04-arm
                      target: linux-arm64
                      rust_target: aarch64-unknown-linux-musl
                      zig_arch: aarch64
                    - runner: macos-15
                      target: darwin-arm64
                      rust_target: aarch64-apple-darwin
                    - runner: macos-15-intel
                      target: darwin-x64
                      rust_target: x86_64-apple-darwin
                    - runner: windows-2022
                      target: windows-x64
                      rust_target: x86_64-pc-windows-msvc
                    - runner: windows-11-arm
                      target: windows-arm64
                      rust_target: aarch64-pc-windows-msvc

        runs-on: ${{ matrix.runner }}

        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.13.1

            - uses: actions/setup-node@v5
              with:
                  node-version: 24
                  package-manager-cache: false

            - name: 安装 Rust 工具链
              run: |
                  rustup toolchain install stable --profile minimal
                  rustup default stable
                  rustup target add "${{ matrix.rust_target }}"

            - name: 安装 Zig 工具链
              if: runner.os == 'Linux'
              shell: bash
              run: |
                  set -euo pipefail
                  zig_root="$RUNNER_TEMP/zig-0.14.1"
                  curl -fsSL "https://ziglang.org/download/0.14.1/zig-${{ matrix.zig_arch }}-linux-0.14.1.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
                  mkdir -p "$zig_root"
                  tar -xJf "$RUNNER_TEMP/zig.tar.xz" --strip-components=1 -C "$zig_root"
                  echo "$zig_root" >> "$GITHUB_PATH"

            - name: 安装 cargo-zigbuild
              if: runner.os == 'Linux'
              run: cargo install --locked cargo-zigbuild --version 0.23.0

            - name: 安装依赖并构建目标应用
              run: |
                  pnpm install --frozen-lockfile
                  pnpm build

            - name: 构建目标发布资产
              run: |
                  pnpm build:worker "${{ matrix.target }}" --output-dir ./release-assets
                  pnpm package:app -- --target "${{ matrix.target }}" --output-dir ./release-assets

            - uses: actions/upload-artifact@v7
              with:
                  name: release-assets-${{ matrix.target }}
                  path: release-assets/*

    publish:
        needs:
            - build-worker
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - uses: actions/download-artifact@v8
              with:
                  merge-multiple: true
                  path: release-assets

            - name: 附加安装脚本
              run: |
                  cp ./scripts/install-release.sh ./release-assets/install-release.sh
                  chmod 755 ./release-assets/install-release.sh
                  (cd ./release-assets && sha256sum install-release.sh > install-release.sh.sha256)
                  cp ./scripts/install-release.ps1 ./release-assets/install-release.ps1
                  sha256sum ./release-assets/install-release.ps1 > ./release-assets/install-release.ps1.sha256

            - name: 发布 GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  tag="${GITHUB_REF_NAME}"
                  if gh release view "$tag" >/dev/null 2>&1; then
                    gh release upload "$tag" release-assets/* --clobber
                  else
                    gh release create "$tag" release-assets/* --generate-notes --title "$tag"
                  fi

    bump-next-development-version:
        needs:
            - publish
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0
                  ref: ${{ github.event.repository.default_branch }}

            - uses: actions/setup-node@v5
              with:
                  node-version: 24
                  package-manager-cache: false

            - name: 发布后立即进入下一个开发版本
              env:
                  RELEASE_COMMIT: ${{ github.sha }}
                  RELEASE_TAG: ${{ github.ref_name }}
              run: |
                  set -euo pipefail
                  if ! git merge-base --is-ancestor "$RELEASE_COMMIT" HEAD; then
                    echo "release commit is not an ancestor of the default branch" >&2
                    exit 1
                  fi
                  node ./scripts/version-state.mjs advance-after-release "$RELEASE_TAG"
                  if git diff --quiet -- package.json crates/devshell-worker/Cargo.toml Cargo.lock; then
                    echo "default branch has already advanced beyond $RELEASE_TAG"
                    exit 0
                  fi
                  node ./scripts/version-state.mjs check-development
                  next_version=$(node -p 'require("./package.json").version')
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add package.json crates/devshell-worker/Cargo.toml Cargo.lock
                  git commit -m "chore: bump version to $next_version"
                  git push origin "HEAD:${{ github.event.repository.default_branch }}"
