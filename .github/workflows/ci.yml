name: ci

on:
    workflow_dispatch:
    pull_request:
    push:
        tags:
            - "dev*"

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
            - uses: pnpm/action-setup@v5
              with:
                  version: 10.13.1
            - uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: pnpm
            - name: 安装 Rust 工具链
              run: |
                  rustup toolchain install stable --profile minimal
                  rustup default stable
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm build
            - run: cargo build --locked --workspace
            - run: pnpm package:app -- --output-dir ./ci-artifacts
            - uses: actions/upload-artifact@v7
              with:
                  name: portable-devshell-app-${{ github.sha }}
                  path: ci-artifacts/*

    test:
        needs: build
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
            - uses: pnpm/action-setup@v5
              with:
                  version: 10.13.1
            - uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: pnpm
            - name: 安装 Rust 工具链
              run: |
                  rustup toolchain install stable --profile minimal
                  rustup default stable
            - run: pnpm install --frozen-lockfile
            - run: bash acceptance/run-final-acceptance.sh
