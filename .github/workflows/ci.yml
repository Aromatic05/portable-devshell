name: ci

on:
    workflow_dispatch:
    pull_request:
    push:
        tags:
            - "dev*"

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0
            - uses: pnpm/action-setup@v5
              with:
                  version: 10.13.1
            - uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: pnpm
            - name: 安装 Rust 工具链
              run: |
                  rustup toolchain install stable --profile minimal
                  rustup default stable
                  rustup target add x86_64-unknown-linux-musl
            - name: 安装 Zig 工具链
              shell: bash
              run: |
                  set -euo pipefail
                  zig_root="$RUNNER_TEMP/zig-0.14.1"
                  curl -fsSL https://ziglang.org/download/0.14.1/zig-x86_64-linux-0.14.1.tar.xz -o "$RUNNER_TEMP/zig.tar.xz"
                  mkdir -p "$zig_root"
                  tar -xJf "$RUNNER_TEMP/zig.tar.xz" --strip-components=1 -C "$zig_root"
                  echo "$zig_root" >> "$GITHUB_PATH"
            - name: 安装 cargo-zigbuild
              run: cargo install --locked cargo-zigbuild --version 0.23.0
            - run: node ./scripts/version-state.mjs check-development
            - run: pnpm install --frozen-lockfile
            - run: node --test ./scripts/*.test.mjs
            - run: pnpm lint
            - run: pnpm build
            - run: cargo build --locked --workspace
            - run: pnpm build:worker linux-x64
            - run: pnpm package:app -- --output-dir ./ci-artifacts
            - run: pnpm smoke:package -- ./ci-artifacts/portable-devshell-app.tar.gz
            - run: pnpm smoke:install-release -- ./ci-artifacts/portable-devshell-app.tar.gz
            - uses: actions/upload-artifact@v7
              with:
                  name: portable-devshell-app-${{ github.sha }}
                  path: ci-artifacts/*

    test:
        needs: build
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0
            - uses: pnpm/action-setup@v5
              with:
                  version: 10.13.1
            - uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: pnpm
            - name: 安装 Rust 工具链
              run: |
                  rustup toolchain install stable --profile minimal
                  rustup default stable
            - run: pnpm install --frozen-lockfile
            - run: bash acceptance/run-final-acceptance.sh
